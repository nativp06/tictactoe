<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>לוח המשימות 🌟</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --almog: #a78bfa;
      --almog2: #7c3aed;
      --libi: #f472b6;
      --libi2: #be185d;
      --green: #3fb950;
      --yellow: #d29922;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── SCREENS ── */
    .screen { display: none; width: 100%; max-width: 1000px; padding: 20px; }
    .screen.active { display: flex; flex-direction: column; align-items: center; }

    /* ── HOME ── */
    #home { justify-content: center; min-height: 100vh; gap: 32px; }

    .home-title {
      font-size: 2.2rem;
      font-weight: 800;
      text-align: center;
      background: linear-gradient(135deg, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .home-subtitle { font-size: 1rem; color: var(--muted); margin-top: -20px; }

    .child-buttons { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }

    .child-btn {
      width: 180px;
      padding: 32px 20px;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
    }
    .child-btn:hover { transform: translateY(-4px); }
    .child-btn .emoji { font-size: 3.5rem; line-height: 1; }
    .child-btn .child-score {
      font-size: .8rem;
      font-weight: 600;
      background: rgba(0,0,0,.25);
      padding: 4px 12px;
      border-radius: 20px;
      margin-top: 4px;
    }

    .btn-almog { background: linear-gradient(135deg, var(--almog), var(--almog2)); box-shadow: 0 8px 32px rgba(124,58,237,.35); }
    .btn-libi  { background: linear-gradient(135deg, var(--libi),  var(--libi2));  box-shadow: 0 8px 32px rgba(190,24,93,.35); }

    .parent-link {
      font-size: .78rem;
      color: var(--muted);
      text-decoration: none;
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 20px;
      transition: color .2s, border-color .2s;
    }
    .parent-link:hover { color: var(--text); border-color: var(--muted); }

    /* ── BOARD ── */
    #board { gap: 20px; }

    .board-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 20px;
    }

    .board-header .child-name { font-size: 1.4rem; font-weight: 800; }
    .board-header .week-range { font-size: .85rem; color: var(--muted); margin-top: 2px; }
    .board-header .week-score {
      font-size: 1.6rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .board-header .week-score small { font-size: .75rem; color: var(--muted); font-weight: 400; }

    .back-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: .85rem;
      transition: background .15s;
    }
    .back-btn:hover { background: var(--border); }

    /* ── TASK TABLE ── */
    .table-wrap { width: 100%; overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 6px;
      min-width: 600px;
    }

    thead th {
      font-size: .75rem;
      color: var(--muted);
      font-weight: 600;
      padding: 6px 10px;
      text-align: center;
      letter-spacing: .5px;
    }
    thead th:first-child { text-align: right; }

    .day-header { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .day-header .day-name { font-size: .75rem; color: var(--muted); }
    .day-header .day-date { font-size: .7rem; color: var(--border); }
    .day-header.today .day-name { color: var(--text); font-weight: 700; }
    .day-header.today .day-date { color: var(--green); }

    tbody tr {
      background: var(--bg2);
      border-radius: 12px;
    }

    tbody td {
      padding: 10px;
      vertical-align: middle;
    }
    tbody td:first-child {
      border-radius: 12px 0 0 12px;
      padding-right: 16px;
    }
    tbody td:last-child {
      border-radius: 0 12px 12px 0;
      padding-left: 16px;
    }

    .task-info { display: flex; align-items: center; gap: 8px; }
    .task-icon { font-size: 1.4rem; width: 32px; text-align: center; }
    .task-name { font-size: .9rem; font-weight: 600; }
    .task-pts { font-size: .72rem; color: var(--muted); margin-top: 1px; }

    .check-cell { text-align: center; }

    .check-btn {
      width: 42px;
      height: 42px;
      border: 2px solid var(--border);
      background: var(--bg3);
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.3rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      color: transparent;
      user-select: none;
    }
    .check-btn:hover { border-color: var(--muted); background: var(--bg); }
    .check-btn.done {
      background: rgba(63,185,80,.15);
      border-color: var(--green);
      color: var(--green);
    }
    .check-btn.done:hover { background: rgba(63,185,80,.25); }

    @keyframes pop {
      0%  { transform: scale(1); }
      40% { transform: scale(1.3); }
      70% { transform: scale(.9); }
      100%{ transform: scale(1); }
    }
    .check-btn.pop { animation: pop .3s ease; }

    .day-total {
      text-align: center;
      font-size: .85rem;
      font-weight: 700;
      color: var(--yellow);
      min-width: 36px;
    }

    tfoot td {
      padding: 8px 10px;
      font-size: .8rem;
      font-weight: 700;
      text-align: center;
      color: var(--muted);
    }
    tfoot td:first-child { text-align: right; padding-right: 16px; color: var(--muted); font-size: .75rem; }
    tfoot .col-total { color: var(--yellow); font-size: .9rem; }

    /* ── PARENT MODAL ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .modal-title { font-size: 1.2rem; font-weight: 700; }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .inp {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: .9rem;
      outline: none;
      font-family: inherit;
    }
    .inp:focus { border-color: var(--almog); }
    .inp-sm { width: 70px; flex: none; text-align: center; }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: .85rem;
      font-weight: 600;
      font-family: inherit;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--almog); color: #fff; }
    .btn-danger  { background: #ef4444; color: #fff; }
    .btn-ghost   { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
    .btn-sm { padding: 6px 12px; font-size: .78rem; }

    .task-editor-row {
      display: flex;
      gap: 8px;
      align-items: center;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
    }
    .task-editor-row .inp { background: var(--bg2); }
    .task-editor-row .emoji-inp { width: 52px; text-align: center; flex: none; }
    .task-editor-row .name-inp { flex: 1; }
    .task-editor-row .pts-inp  { width: 60px; flex: none; text-align: center; }

    .del-btn {
      background: none;
      border: none;
      color: #ef4444;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      flex: none;
    }

    .section-label { font-size: .78rem; color: var(--muted); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }

    .pass-row { display: flex; gap: 10px; align-items: center; }

    .msg { font-size: .82rem; color: var(--green); min-height: 1em; }

    .mini-scores {
      display: flex;
      gap: 16px;
    }
    .mini-score-box {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }
    .mini-score-box .msb-name { font-size: .8rem; color: var(--muted); margin-bottom: 6px; }
    .mini-score-box .msb-val  { font-size: 2rem; font-weight: 800; }
    .mini-score-box .msb-sub  { font-size: .75rem; color: var(--muted); margin-top: 2px; }

    /* ── PASS SCREEN ── */
    #pass-modal .modal { max-width: 340px; align-items: center; text-align: center; }
    #pass-modal .pass-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
    #pass-modal .pass-sub   { font-size: .85rem; color: var(--muted); }
    #pass-modal .inp { text-align: center; font-size: 1.2rem; letter-spacing: 4px; }
    #pass-modal .err { color: #ef4444; font-size: .82rem; min-height: 1em; }

    /* ── CHILD PIN MODAL ── */
    #child-pin-modal .modal { max-width: 360px; align-items: center; text-align: center; gap: 14px; }
    #child-pin-modal .pin-emoji { font-size: 3rem; line-height: 1; }
    #child-pin-modal .pin-title { font-size: 1.3rem; font-weight: 800; }
    #child-pin-modal .pin-sub   { font-size: .85rem; color: var(--muted); }
    #child-pin-modal .inp { text-align: center; font-size: 1.4rem; letter-spacing: 6px; width: 100%; }
    #child-pin-modal .pin-err { color: #ef4444; font-size: .82rem; min-height: 1.2em; }
    .pin-dots { display: flex; gap: 10px; justify-content: center; margin: 4px 0; }
    .pin-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--border); transition: background .15s; }
    .pin-dot.filled { background: currentColor; }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .home-title { font-size: 1.6rem; }
      .child-btn  { width: 140px; padding: 24px 14px; }
      .check-btn  { width: 36px; height: 36px; font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<!-- ═══════════════ HOME ═══════════════ -->
<div id="home" class="screen active">
  <div class="home-title">לוח המשימות של המשפחה 🌟</div>
  <div class="home-subtitle">בחר את השם שלך כדי לסמן משימות</div>

  <div class="child-buttons">
    <button class="child-btn btn-almog" onclick="enterBoard('almog')">
      <span class="emoji">👦</span>
      <span>אלמוג</span>
      <span class="child-score" id="score-almog">⭐ 0 נקודות</span>
    </button>
    <button class="child-btn btn-libi" onclick="enterBoard('libi')">
      <span class="emoji">👧</span>
      <span>ליבי</span>
      <span class="child-score" id="score-libi">⭐ 0 נקודות</span>
    </button>
  </div>

  <a href="#" class="parent-link" onclick="openPassModal(event)">🔒 הורים</a>
</div>

<!-- ═══════════════ BOARD ═══════════════ -->
<div id="board" class="screen">
  <div class="board-header">
    <div>
      <div class="child-name" id="board-name">אלמוג</div>
      <div class="week-range" id="board-week"></div>
    </div>
    <div class="week-score" id="board-score">⭐ 0 <small>נקודות השבוע</small></div>
    <button class="back-btn" onclick="goHome()">← חזרה</button>
  </div>

  <div class="table-wrap">
    <table id="task-table">
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
      <tfoot id="table-foot"></tfoot>
    </table>
  </div>
</div>

<!-- ═══════════════ PASSWORD MODAL ═══════════════ -->
<div id="pass-modal" class="overlay">
  <div class="modal">
    <div class="pass-title">🔒 כניסת הורים</div>
    <div class="pass-sub">הזן סיסמה</div>
    <input type="password" class="inp" id="pass-input" maxlength="10" placeholder="••••"
           onkeydown="if(event.key==='Enter') checkPass()" autocomplete="off" />
    <div class="err" id="pass-err"></div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-primary" onclick="checkPass()">כניסה</button>
      <button class="btn btn-ghost" onclick="closePassModal()">ביטול</button>
    </div>
  </div>
</div>

<!-- ═══════════════ CHILD PIN MODAL ═══════════════ -->
<div id="child-pin-modal" class="overlay">
  <div class="modal">
    <div class="pin-emoji" id="cp-emoji">👦</div>
    <div class="pin-title" id="cp-title">שלום אלמוג!</div>
    <div class="pin-sub"  id="cp-sub">הזן את הקוד הסודי שלך</div>
    <div class="pin-dots" id="cp-dots"></div>
    <input type="password" inputmode="numeric" class="inp" id="cp-input"
           maxlength="4" placeholder="••••" autocomplete="off"
           oninput="onPinInput()" onkeydown="if(event.key==='Enter'){event.preventDefault();submitPin();}" />
    <div id="cp-confirm-wrap" style="display:none; width:100%; flex-direction:column; align-items:center; gap:8px;">
      <div class="pin-sub">אשר את הקוד</div>
      <div class="pin-dots" id="cp-dots2"></div>
      <input type="password" inputmode="numeric" class="inp" id="cp-confirm"
             maxlength="4" placeholder="••••" autocomplete="off"
             oninput="onConfirmInput()" onkeydown="if(event.key==='Enter'){event.preventDefault();submitPin();}" />
    </div>
    <div class="pin-err" id="cp-err"></div>
    <div style="display:flex; gap:10px; width:100%; justify-content:center;">
      <button type="button" class="btn btn-primary" id="cp-btn" onclick="submitPin()">כניסה</button>
      <button type="button" class="btn btn-ghost" onclick="closeChildPin()">ביטול</button>
    </div>
  </div>
</div>

<!-- ═══════════════ PARENT PANEL ═══════════════ -->
<div id="parent-modal" class="overlay">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div class="modal-title">⚙️ פאנל הורים</div>
      <button class="btn btn-ghost btn-sm" onclick="closeParent()">✕ סגור</button>
    </div>

    <!-- Scores -->
    <div>
      <div class="section-label">ניקוד שבוע זה</div>
      <div class="mini-scores">
        <div class="mini-score-box">
          <div class="msb-name" style="color:var(--almog)">👦 אלמוג</div>
          <div class="msb-val" style="color:var(--almog)" id="p-score-almog">0</div>
          <div class="msb-sub">נקודות</div>
          <button class="btn btn-ghost btn-sm" style="margin-top:8px;font-size:.72rem;" onclick="resetChildPin('almog')">🔑 איפוס קוד</button>
        </div>
        <div class="mini-score-box">
          <div class="msb-name" style="color:var(--libi)">👧 ליבי</div>
          <div class="msb-val" style="color:var(--libi)"  id="p-score-libi">0</div>
          <div class="msb-sub">נקודות</div>
          <button class="btn btn-ghost btn-sm" style="margin-top:8px;font-size:.72rem;" onclick="resetChildPin('libi')">🔑 איפוס קוד</button>
        </div>
      </div>
    </div>

    <!-- Task editor -->
    <div>
      <div class="section-label">ניהול משימות</div>
      <div id="task-editor" style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px;"></div>
      <button class="btn btn-ghost btn-sm" onclick="addTaskRow()">+ הוסף משימה</button>
    </div>

    <!-- Reset week -->
    <div>
      <div class="section-label">איפוס</div>
      <button class="btn btn-danger btn-sm" onclick="confirmReset()">🔄 איפוס שבוע עכשיו</button>
    </div>

    <!-- Change password -->
    <div>
      <div class="section-label">שינוי סיסמה</div>
      <div class="pass-row">
        <input type="password" class="inp" id="new-pass" placeholder="סיסמה חדשה" maxlength="20" autocomplete="off" />
        <button class="btn btn-ghost btn-sm" onclick="changePass()">שמור</button>
      </div>
      <div class="msg" id="pass-save-msg"></div>
    </div>

    <!-- Save tasks -->
    <div style="display:flex;justify-content:flex-end;">
      <button class="btn btn-primary" onclick="saveTasks()">💾 שמור משימות</button>
    </div>
    <div class="msg" id="tasks-save-msg"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════
const LS_KEY = 'kidsTasksData';
const DAYS_HE = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];

const DEFAULT_TASKS = [
  { id:'plants',  name:'השקיית עציצים', icon:'🌱', points:5  },
  { id:'max',     name:'אוכל למקס',      icon:'🐕', points:5  },
  { id:'dishes',  name:'ניקיון מדיח',    icon:'🍽️', points:10 },
  { id:'clean',   name:'ניקיון כללי',    icon:'🧹', points:15 },
  { id:'laundry', name:'קיפול כביסה',   icon:'👕', points:10 },
  { id:'room',    name:'סידור חדר',      icon:'🛏️', points:10 },
  { id:'trash',   name:'הוצאת אשפה',    icon:'🗑️', points:8  },
  { id:'table',   name:'ניקיון שולחן',  icon:'🪟', points:5  },
];

let data = {};

function loadData() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    data = raw ? JSON.parse(raw) : {};
  } catch(_) { data = {}; }

  if (!data.tasks)      data.tasks      = JSON.parse(JSON.stringify(DEFAULT_TASKS));
  if (!data.parentPass) data.parentPass = '0000';
  if (!data.childPins)  data.childPins  = { almog: null, libi: null };
  if (!data.almog)      data.almog      = {};
  if (!data.libi)       data.libi       = {};

  // weekly auto-reset
  const currentSunday = getSunday();
  if (data.weekStart !== currentSunday) {
    data.almog = {};
    data.libi  = {};
    data.weekStart = currentSunday;
  }
  save();
}

function save() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(_) {}
}

// ═══════════════════════════════════════════════════
// DATE HELPERS
// ═══════════════════════════════════════════════════
function getSunday(d) {
  d = d ? new Date(d) : new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay()); // getDay() 0=Sun
  return d.toISOString().slice(0,10);
}

function getWeekDates() {
  const dates = [];
  const sun = new Date(data.weekStart + 'T00:00:00');
  for (let i = 0; i < 7; i++) {
    const d = new Date(sun);
    d.setDate(sun.getDate() + i);
    dates.push(d.toISOString().slice(0,10));
  }
  return dates;
}

function fmtDate(isoStr) {
  const d = new Date(isoStr + 'T00:00:00');
  return `${d.getDate()}/${d.getMonth()+1}`;
}

function todayISO() {
  return new Date().toISOString().slice(0,10);
}

// ═══════════════════════════════════════════════════
// SCORING
// ═══════════════════════════════════════════════════
function calcWeekPoints(child) {
  let total = 0;
  const childData = data[child] || {};
  for (const dateStr of Object.keys(childData)) {
    for (const [taskId, done] of Object.entries(childData[dateStr])) {
      if (done) {
        const task = data.tasks.find(t => t.id === taskId);
        if (task) total += task.points;
      }
    }
  }
  return total;
}

function calcDayPoints(child, dateStr) {
  let total = 0;
  const dayData = (data[child] || {})[dateStr] || {};
  for (const [taskId, done] of Object.entries(dayData)) {
    if (done) {
      const task = data.tasks.find(t => t.id === taskId);
      if (task) total += task.points;
    }
  }
  return total;
}

function calcTaskPoints(child, taskId) {
  let total = 0;
  const childData = data[child] || {};
  const task = data.tasks.find(t => t.id === taskId);
  if (!task) return 0;
  for (const dateStr of Object.keys(childData)) {
    if (childData[dateStr][taskId]) total += task.points;
  }
  return total;
}

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
let currentChild = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.style.display = 'none';
  });
  const target = document.getElementById(id);
  target.classList.add('active');
  target.style.display = 'flex';
}

function goHome() {
  currentChild = null;
  updateHomeScores();
  showScreen('home');
}

function updateHomeScores() {
  const a = calcWeekPoints('almog');
  const l = calcWeekPoints('libi');
  document.getElementById('score-almog').textContent = `⭐ ${a} נקודות`;
  document.getElementById('score-libi').textContent  = `⭐ ${l} נקודות`;
}

function enterBoard(child) {
  openChildPin(child);
}

// ═══════════════════════════════════════════════════
// CHILD PIN MODAL
// ═══════════════════════════════════════════════════
let pinChild = null;   // which child is logging in
let pinMode  = null;   // 'enter' | 'set'

const childEmojis = { almog: '👦', libi: '👧' };

function openChildPin(child) {
  pinChild = child;
  const hasPIN = !!data.childPins[child];
  pinMode = hasPIN ? 'enter' : 'set';

  const color = childColors[child];
  document.getElementById('cp-emoji').textContent = childEmojis[child];
  document.getElementById('cp-title').textContent =
    pinMode === 'set' ? `היי ${childNames[child]}! בחר קוד סודי` : `שלום ${childNames[child]}!`;
  document.getElementById('cp-sub').textContent =
    pinMode === 'set' ? 'הזן 4 ספרות — הקוד הסודי שלך' : 'הזן את הקוד הסודי שלך';
  document.getElementById('cp-btn').textContent = pinMode === 'set' ? 'הגדר קוד' : 'כניסה';
  document.getElementById('cp-btn').style.background = color;

  const confirmWrap = document.getElementById('cp-confirm-wrap');
  confirmWrap.style.display = pinMode === 'set' ? 'flex' : 'none';

  document.getElementById('cp-input').value   = '';
  document.getElementById('cp-confirm').value = '';
  document.getElementById('cp-err').textContent = '';
  renderPinDots('cp-dots',  0);
  renderPinDots('cp-dots2', 0, color);

  document.getElementById('cp-dots').style.color  = color;
  document.getElementById('cp-dots2').style.color = color;

  document.getElementById('child-pin-modal').classList.add('open');
  setTimeout(() => document.getElementById('cp-input').focus(), 100);
}

function closeChildPin() {
  document.getElementById('child-pin-modal').classList.remove('open');
  pinChild = null;
}

function renderPinDots(id, count, color) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.color = color || 'currentColor';
  el.innerHTML = Array.from({length:4}, (_,i) =>
    `<div class="pin-dot${i < count ? ' filled' : ''}"></div>`
  ).join('');
}

function onPinInput() {
  const val = document.getElementById('cp-input').value.replace(/\D/g,'');
  document.getElementById('cp-input').value = val;
  renderPinDots('cp-dots', val.length, childColors[pinChild]);
  document.getElementById('cp-err').textContent = '';
  if (val.length === 4 && pinMode === 'set') {
    setTimeout(() => document.getElementById('cp-confirm').focus(), 50);
  }
}

function onConfirmInput() {
  const val = document.getElementById('cp-confirm').value.replace(/\D/g,'');
  document.getElementById('cp-confirm').value = val;
  renderPinDots('cp-dots2', val.length, childColors[pinChild]);
  document.getElementById('cp-err').textContent = '';
}

function submitPin() {
  const child = pinChild;
  const pin   = document.getElementById('cp-input').value;
  const err   = document.getElementById('cp-err');

  console.log('[submitPin] child:', child, '| mode:', pinMode, '| pin:', pin, '| stored:', data.childPins[child]);

  if (pin.length < 4) {
    console.log('[submitPin] too short');
    err.textContent = '❌ הקוד צריך להיות 4 ספרות';
    return;
  }

  if (pinMode === 'set') {
    const confirmVal = document.getElementById('cp-confirm').value;
    console.log('[submitPin] set mode | confirm:', confirmVal);
    if (pin !== confirmVal) {
      err.textContent = '❌ הקודים לא תואמים, נסה שוב';
      document.getElementById('cp-confirm').value = '';
      renderPinDots('cp-dots2', 0, childColors[child]);
      document.getElementById('cp-confirm').focus();
      return;
    }
    data.childPins[child] = pin;
    save();
  } else {
    console.log('[submitPin] enter mode | match:', pin === data.childPins[child]);
    if (pin !== data.childPins[child]) {
      err.textContent = '❌ קוד שגוי, נסה שוב';
      document.getElementById('cp-input').value = '';
      renderPinDots('cp-dots', 0, childColors[child]);
      document.getElementById('cp-input').focus();
      return;
    }
  }

  console.log('[submitPin] SUCCESS → going to board for', child);
  pinChild = null;
  document.getElementById('child-pin-modal').classList.remove('open');
  currentChild = child;
  if (!data[child]) data[child] = {};
  showScreen('board');
  try { renderBoard(); } catch(e) { console.error('renderBoard error:', e); }
}

function resetChildPin(child) {
  const name = childNames[child];
  if (!confirm(`לאפס את הקוד של ${name}? הפעם הבאה שייכנס יצטרך לבחור קוד חדש.`)) return;
  data.childPins[child] = null;
  save();
  const msg = document.getElementById('tasks-save-msg');
  msg.textContent = `✓ קוד ${name} אופס`;
  setTimeout(() => { msg.textContent = ''; }, 2000);
}

// ═══════════════════════════════════════════════════
// BOARD RENDER
// ═══════════════════════════════════════════════════
const childNames = { almog: 'אלמוג', libi: 'ליבי' };
const childColors = { almog: 'var(--almog)', libi: 'var(--libi)' };

function renderBoard() {
  const child = currentChild;
  console.log('[renderBoard] child:', child, '| data[child]:', data[child]);
  if (!child) { console.error('[renderBoard] no currentChild!'); return; }
  if (!data[child]) data[child] = {};
  const dates = getWeekDates();
  const today = todayISO();

  // header
  document.getElementById('board-name').textContent = childNames[child];
  document.getElementById('board-name').style.color = childColors[child];
  document.getElementById('board-week').textContent =
    `שבוע: ${fmtDate(dates[0])} – ${fmtDate(dates[6])}`;
  updateBoardScore();

  // ── THEAD ──
  const head = document.getElementById('table-head');
  let headHtml = '<tr><th>משימה</th>';
  for (let i = 0; i < 7; i++) {
    const isToday = dates[i] === today;
    headHtml += `<th>
      <div class="day-header${isToday?' today':''}">
        <span class="day-name">${DAYS_HE[i]}</span>
        <span class="day-date">${fmtDate(dates[i])}</span>
      </div>
    </th>`;
  }
  headHtml += '<th>סה"כ</th></tr>';
  head.innerHTML = headHtml;

  // ── TBODY ──
  const body = document.getElementById('table-body');
  let bodyHtml = '';
  for (const task of data.tasks) {
    bodyHtml += `<tr>
      <td>
        <div class="task-info">
          <span class="task-icon">${task.icon}</span>
          <div>
            <div class="task-name">${task.name}</div>
            <div class="task-pts">+${task.points} נקודות</div>
          </div>
        </div>
      </td>`;
    for (const dateStr of dates) {
      const done = !!(((data[child] || {})[dateStr] || {})[task.id]);
      bodyHtml += `<td class="check-cell">
        <button class="check-btn${done?' done':''}"
                id="cb-${task.id}-${dateStr}"
                onclick="toggleTask('${task.id}','${dateStr}',this)">✓</button>
      </td>`;
    }
    const taskTotal = calcTaskPoints(child, task.id);
    bodyHtml += `<td class="day-total" id="rt-${task.id}">${taskTotal > 0 ? '⭐'+taskTotal : '—'}</td>`;
    bodyHtml += '</tr>';
  }
  body.innerHTML = bodyHtml;

  // ── TFOOT ──
  const foot = document.getElementById('table-foot');
  let footHtml = '<tr><td>סה"כ יומי</td>';
  for (const dateStr of dates) {
    const pts = calcDayPoints(child, dateStr);
    footHtml += `<td class="col-total" id="dt-${dateStr}">${pts > 0 ? pts : '—'}</td>`;
  }
  footHtml += '<td></td></tr>';
  foot.innerHTML = footHtml;
}

function updateBoardScore() {
  const pts = calcWeekPoints(currentChild);
  document.getElementById('board-score').innerHTML =
    `⭐ ${pts} <small>נקודות השבוע</small>`;
  document.getElementById('board-score').style.color = childColors[currentChild];
}

function toggleTask(taskId, dateStr, btn) {
  const child = currentChild;
  if (!data[child][dateStr]) data[child][dateStr] = {};
  const current = !!data[child][dateStr][taskId];
  data[child][dateStr][taskId] = !current;
  save();

  // update button
  btn.classList.toggle('done', !current);
  btn.classList.remove('pop');
  void btn.offsetWidth; // reflow
  btn.classList.add('pop');

  // update day total
  const dt = document.getElementById(`dt-${dateStr}`);
  if (dt) {
    const pts = calcDayPoints(child, dateStr);
    dt.textContent = pts > 0 ? pts : '—';
  }
  // update row total
  const rt = document.getElementById(`rt-${taskId}`);
  if (rt) {
    const pts = calcTaskPoints(child, taskId);
    rt.textContent = pts > 0 ? '⭐'+pts : '—';
  }
  updateBoardScore();
}

// ═══════════════════════════════════════════════════
// PASSWORD MODAL
// ═══════════════════════════════════════════════════
function openPassModal(e) {
  if (e) e.preventDefault();
  document.getElementById('pass-input').value = '';
  document.getElementById('pass-err').textContent = '';
  document.getElementById('pass-modal').classList.add('open');
  setTimeout(() => document.getElementById('pass-input').focus(), 100);
}

function closePassModal() {
  document.getElementById('pass-modal').classList.remove('open');
}

function checkPass() {
  const val = document.getElementById('pass-input').value;
  if (val === data.parentPass) {
    closePassModal();
    openParent();
  } else {
    document.getElementById('pass-err').textContent = '❌ סיסמה שגויה';
    document.getElementById('pass-input').value = '';
    document.getElementById('pass-input').focus();
  }
}

// ═══════════════════════════════════════════════════
// PARENT PANEL
// ═══════════════════════════════════════════════════
function openParent() {
  document.getElementById('p-score-almog').textContent = calcWeekPoints('almog');
  document.getElementById('p-score-libi').textContent  = calcWeekPoints('libi');
  renderTaskEditor();
  document.getElementById('tasks-save-msg').textContent = '';
  document.getElementById('pass-save-msg').textContent  = '';
  document.getElementById('new-pass').value = '';
  document.getElementById('parent-modal').classList.add('open');
}

function closeParent() {
  document.getElementById('parent-modal').classList.remove('open');
}

function renderTaskEditor() {
  const container = document.getElementById('task-editor');
  let html = '';
  for (let i = 0; i < data.tasks.length; i++) {
    const t = data.tasks[i];
    html += `<div class="task-editor-row" id="ter-${i}">
      <input class="inp emoji-inp" value="${t.icon}" maxlength="3" placeholder="🌱" />
      <input class="inp name-inp" value="${t.name}" placeholder="שם משימה" />
      <input class="inp pts-inp" type="number" min="1" max="999" value="${t.points}" />
      <button class="del-btn" onclick="removeTaskRow(${i})">✕</button>
    </div>`;
  }
  container.innerHTML = html;
}

function addTaskRow() {
  const newId = 'task_' + Date.now();
  data.tasks.push({ id: newId, name: 'משימה חדשה', icon: '✏️', points: 5 });
  renderTaskEditor();
}

function removeTaskRow(i) {
  if (data.tasks.length <= 1) return;
  data.tasks.splice(i, 1);
  renderTaskEditor();
}

function saveTasks() {
  const rows = document.getElementById('task-editor').children;
  const newTasks = [];
  for (let i = 0; i < rows.length; i++) {
    const inputs = rows[i].querySelectorAll('input');
    const icon   = inputs[0].value.trim() || '✏️';
    const name   = inputs[1].value.trim();
    const points = parseInt(inputs[2].value) || 5;
    if (!name) continue;
    const existing = data.tasks[i] || {};
    newTasks.push({ id: existing.id || ('task_'+i), name, icon, points });
  }
  data.tasks = newTasks;
  save();
  document.getElementById('tasks-save-msg').textContent = '✓ נשמר!';
  setTimeout(() => { document.getElementById('tasks-save-msg').textContent = ''; }, 1500);
  if (currentChild) renderBoard();
}

function changePass() {
  const np = document.getElementById('new-pass').value.trim();
  if (!np) return;
  data.parentPass = np;
  save();
  document.getElementById('pass-save-msg').textContent = '✓ סיסמה שונתה!';
  document.getElementById('new-pass').value = '';
  setTimeout(() => { document.getElementById('pass-save-msg').textContent = ''; }, 1500);
}

function confirmReset() {
  if (!confirm('בטוח שרוצה לאפס את כל המשימות השבועיות?')) return;
  data.almog = {};
  data.libi  = {};
  data.weekStart = getSunday();
  save();
  document.getElementById('p-score-almog').textContent = 0;
  document.getElementById('p-score-libi').textContent  = 0;
  if (currentChild) renderBoard();
  updateHomeScores();
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
window.onerror = function(msg, src, line) {
  const d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#ef4444;color:#fff;padding:12px 16px;z-index:9999;font-size:13px;font-family:monospace;';
  d.textContent = 'JS ERROR (line ' + line + '): ' + msg;
  document.body.appendChild(d);
  return false;
};

loadData();
updateHomeScores();
</script>
